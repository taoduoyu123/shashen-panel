 <!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>煞神 · 主菜单</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  min-height: 100vh;
  background: url("https://i.imgs.ovh/2026/04/16/Zm3uAd.png") center center / cover no-repeat fixed;
  color: #fff;
  font-family: sans-serif;
}
.header {
  background: rgba(0,0,0,0.7);
  padding: 14px;
  text-align: center;
  border-bottom: 2px solid #ff0000;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.logo-text {
  font-size: 24px;
  font-weight: bold;
  color: #ff0000;
  text-shadow: 0 0 8px #ff0000;
}
.header-logo {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #ff0000;
  object-fit: cover;
}
#menuPage {
  padding: 20px;
  display: block;
}
.menu-item {
  background: rgba(0,0,0,0.7);
  border-left: 4px solid #ff0000;
  padding: 20px;
  margin-bottom: 16px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
#kawangPage, #blPage, #noticePage {
  min-height: 100vh;
  padding: 20px;
  display: none;
  position: relative;
}
.backBtn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0,0,0,0.8);
  color: #ff0000;
  border: 1px solid #444;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
.kw-card, .bl-card, .notice-card {
  background: rgba(0,0,0,0.75);
  border-left: 4px solid #ff0000;
  border-radius: 10px;
  padding: 20px;
  margin-top: 120px;
}
.bl-card, .notice-card {
  margin-top: 16px;
}
#blPage .bl-card:first-of-type, .notice-card.first {
  margin-top: 120px;
}
.kw-card a, .bl-card a, .notice-card a {
  color: #ff0000;
  font-weight: bold;
  text-decoration: none;
  font-size: 20px;
}
.music-player {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  z-index: 999;
}
.music-player audio {
  width: 100%;
  border-radius: 50px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo-text">煞神</div>
  <img src="https://i.imgs.ovh/2026/04/16/Zm3uAd.png" class="header-logo">
</div>

<div id="menuPage">
  <div class="menu-item" onclick="showKw()">⚡ 煞神官方卡网</div>
  <div class="menu-item" onclick="showBl()">📥 BL私端公益端</div>
  <div class="menu-item" onclick="showNotice()">📢 官方通知群</div>
</div>

<div id="kawangPage">
  <button class="backBtn" onclick="goBack()">← 返回菜单</button>
  <div class="kw-card">
    <a href="https://new.502fakw.com/shop/ssnb" target="_blank">煞神卡网</a>
  </div>
</div>

<div id="blPage">
  <button class="backBtn" onclick="goBack()">← 返回菜单</button>
  <div class="bl-card">
    <p>BL私端：<a href="https://wwasp.lanzoul.com/b01bjd4rqd">点击下载</a></p>
  </div>
  <div class="bl-card">
    <p>BL公益端：<a href="https://wwasp.lanzoul.com/b01bjd4rkh">点击下载</a></p>
  </div>
  <div class="bl-card">
    <p>私端注册：<a href="http://ssnb.rdzhvip.com/">点击注册</a></p>
  </div>
</div>
<p>上号器抓号器：<a href="https://wwasp.lanzoul.com/b01bjd4s1e">点击下载</a></p>
  </div>
</div>

<div id="noticePage">
  <button class="backBtn" onclick="goBack()">← 返回菜单</button>
  <div class="notice-card first">
    <p>官方TG通知频道：<a href="https://t.me/shashen66">点击进入</a></p>
  </div>
  <div class="notice-card">
    <p>官方QQ通知群①：<a href="https://qm.qq.com/q/t3FZwuSq7Q">点击加入</a></p>
  </div>
  <div class="notice-card">
    <p>官方QQ通知群②：<a href="https://qm.qq.com/q/BtJ0qksQMM">点击加入</a></p>
  </div>
  <div class="notice-card">
    <p>官方QQ通知群③：<a href="https://qm.qq.com/q/hFtNsOJmT0">点击加入</a></p>
  </div>
  <div class="notice-card">
    <p>官方QQ通知群④：<a href="https://qm.qq.com/q/LdoRHjKLqm">点击加入</a></p>
  </div>
  <div class="notice-card">
    <p>官方QQ交流群：<a href="https://qm.qq.com/q/lDU8yx3Wqk">点击加入</a></p>
  </div>
</div>

<!-- ============================================== -->
<!-- 👇 这里是第一个音乐链接 👇 -->
<audio autoplay loop id="bgMusic">
  <source src="https://music.163.com/song/media/outer/url?id=1394167216" type="audio/mpeg">


<!-- 👇 这里是第二个音乐链接（和上面必须一样）👇 -->
<div class="music-player">
  <audio controls id="playerControl">
    <source src="https://music.163.com/song/media/outer/url?id=1394167216" type="audio/mpeg">
  
</div>
<!-- ============================================== -->

<script>
const menuPage = document.getElementById('menuPage');
const kawangPage = document.getElementById('kawangPage');
const blPage = document.getElementById('blPage');
const noticePage = document.getElementById('noticePage');

function showKw(){
  menuPage.style.display='none'; blPage.style.display='none'; noticePage.style.display='none'; kawangPage.style.display='block';
}
function showBl(){
  menuPage.style.display='none'; kawangPage.style.display='none'; noticePage.style.display='none'; blPage.style.display='block';
}
function showNotice(){
  menuPage.style.display='none'; kawangPage.style.display='none'; blPage.style.display='none'; noticePage.style.display='block';
}
function goBack(){
  kawangPage.style.display='none'; blPage.style.display='none'; noticePage.style.display='none'; menuPage.style.display='block';
}

document.addEventListener('DOMContentLoaded', function(){
  let a = document.getElementById('bgMusic');
  let b = document.getElementById('playerControl');
  a.volume = 0.6;
  b.volume = 0.6;

  a.play().catch(()=>{
    document.addEventListener('click',()=>{a.play()}, {once:true})
  });
});
</script>

</body>
</html>
